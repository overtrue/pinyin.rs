name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release"
        required: true

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: 1.95.0

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        shell: bash
        run: |
          if [[ "${{ matrix.cross }}" == "true" ]]; then
            cross build --release --target "${{ matrix.target }}"
          else
            cargo build --release --target "${{ matrix.target }}"
          fi

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          name="pinyin-${{ matrix.target }}"
          mkdir -p "dist/$name"

          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            cp "target/${{ matrix.target }}/release/pinyin.exe" "dist/$name/"
          else
            cp "target/${{ matrix.target }}/release/pinyin" "dist/$name/"
          fi

          cp README.md LICENSE "dist/$name/"

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            powershell -NoProfile -Command "Compress-Archive -Path 'dist/$name' -DestinationPath 'dist/$name.zip' -Force"
          else
            tar -czf "dist/$name.tar.gz" -C dist "$name"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: pinyin-${{ matrix.target }}
          path: dist/pinyin-${{ matrix.target }}.*

  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Pinyin.rs ${{ steps.tag.outputs.tag }}
          files: artifacts/**/*
          generate_release_notes: true

  crates:
    name: Publish crate
    needs: github-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: Swatinem/rust-cache@v2

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          read -r crate_name crate_version < <(
            cargo metadata --no-deps --format-version 1 |
              python3 -c 'import json, sys; package = json.load(sys.stdin)["packages"][0]; print(package["name"], package["version"])'
          )

          http_status=$(curl -sS -o /tmp/crate.json -w '%{http_code}' "https://crates.io/api/v1/crates/${crate_name}")
          if [[ "$http_status" == "200" ]] && python3 - "$crate_version" /tmp/crate.json <<'PY'
          import json
          import sys

          version = sys.argv[1]
          path = sys.argv[2]

          with open(path, "r", encoding="utf-8") as handle:
              payload = json.load(handle)

          sys.exit(0 if any(item.get("num") == version for item in payload.get("versions", [])) else 1)
          PY
          then
            echo "${crate_name} ${crate_version} is already published on crates.io."
            exit 0
          fi

          if [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
            echo "::error::CARGO_REGISTRY_TOKEN is required to publish ${crate_name} ${crate_version}."
            exit 1
          fi

          cargo publish --locked
